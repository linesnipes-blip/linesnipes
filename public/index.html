<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineSnipes — Snipe +EV Bets Before They Disappear</title>
<meta name="description" content="Find positive expected value bets in seconds. Sharp line analysis, boost calculators, parlay optimization.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0D0D0D;--bg2:#161616;--bg3:#1f1f1f;
--fg:#F0F1F2;--fg2:#C2DCF2;--fg3:#6a8099;
--accent:#9BCAF2;--accent2:#F2D6B3;--accent-dim:rgba(155,201,242,0.08);
--red:#ff4757;--gold:#F2D6B3;
--card:rgba(155,201,242,0.03);--border:rgba(155,201,242,0.1);
--font:'Outfit',system-ui,sans-serif;
--mono:'JetBrains Mono',monospace;
--display:'Outfit',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:var(--mono);color:var(--fg);background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;width:100%;transition:border-color .2s}
input:focus{border-color:rgba(155,201,242,.35);box-shadow:0 0 0 3px rgba(155,201,242,.06)}
input::placeholder{color:var(--fg3)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(155,201,242,.12);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(155,201,242,.1)}50%{box-shadow:0 0 40px rgba(155,201,242,.2)}}
@keyframes crosshairPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .6s ease both}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}
.noise{position:fixed;inset:0;opacity:.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
.container-sm{max-width:640px;margin:0 auto;padding:0 16px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(20px);background:rgba(13,13,13,.8);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:1100px;margin:0 auto}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--display);font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px;cursor:pointer}
.crosshair{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-size:16px;font-weight:900;animation:crosshairPulse 3s ease infinite}
.nav-links{display:flex;align-items:center;gap:8px}
.nbtn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s}
.nbtn-g{color:var(--fg2)}.nbtn-g:hover{color:var(--accent)}
.nbtn-p{background:var(--accent);color:var(--bg);font-weight:700}.nbtn-p:hover{box-shadow:0 0 24px rgba(155,201,242,.3)}

/* HERO */
.hero{padding:140px 0 80px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:60px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(155,201,242,.06) 0%,transparent 70%);pointer-events:none}
.htag{display:inline-block;padding:6px 16px;border-radius:20px;background:var(--accent-dim);border:1px solid rgba(155,201,242,.15);color:var(--accent);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:24px}
.hero h1{font-family:var(--display);font-size:clamp(40px,7vw,72px);font-weight:800;color:#fff;line-height:1.05;letter-spacing:-2px;margin-bottom:20px}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:18px;color:var(--fg2);max-width:520px;margin:0 auto 36px;line-height:1.7}
.hcta{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-size:16px;font-weight:700;border-radius:12px;transition:all .2s;animation:glow 3s ease infinite}
.hcta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(155,201,242,.3)}

/* FEATURES */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:80px 0}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;transition:all .2s}
.fcard:hover{border-color:rgba(155,201,242,.2);transform:translateY(-4px)}
.ficon{width:48px;height:48px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.fcard h3{font-family:var(--display);font-size:18px;color:#fff;margin-bottom:8px;font-weight:700}
.fcard p{font-size:14px;color:var(--fg2)}

/* HOW */
.how{padding:80px 0;text-align:center}
.how h2,.pricing h2{font-family:var(--display);font-size:36px;color:#fff;margin-bottom:48px;font-weight:800}
.hsteps{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;max-width:900px;margin:0 auto}
.hstep{text-align:center}
.hnum{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-family:var(--display);font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.hstep h3{color:#fff;font-size:16px;font-weight:700;margin-bottom:8px}
.hstep p{color:var(--fg2);font-size:14px}

/* PRICING */
.pricing{padding:80px 0}
.psub{text-align:center;color:var(--fg2);margin-bottom:48px;font-size:15px;margin-top:-36px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;max-width:1020px;margin:0 auto}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;position:relative;transition:all .2s}
.pcard:hover{border-color:rgba(155,201,242,.15)}
.pcard.pop{border-color:rgba(155,201,242,.3);background:linear-gradient(180deg,rgba(155,201,242,.04) 0%,var(--card) 100%)}
.pcard.pop::before{content:'MOST POPULAR';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);font-size:10px;font-weight:700;padding:4px 16px;border-radius:20px;letter-spacing:1px}
.pname{font-size:14px;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.pprice{font-family:var(--display);font-size:42px;font-weight:800;color:#fff}
.pprice span{font-size:16px;color:var(--fg3);font-family:var(--font);font-weight:400}
.pdesc{color:var(--fg2);font-size:13px;margin:12px 0 24px;min-height:40px}
.pfeats{list-style:none;margin-bottom:28px}
.pfeats li{padding:6px 0;font-size:13px;color:var(--fg2);display:flex;align-items:center;gap:8px}
.pfeats li::before{content:'✓';color:var(--accent);font-weight:700}
.pbtn{width:100%;padding:14px;border-radius:10px;font-weight:700;font-size:14px;transition:all .15s}
.pbtn-p{background:var(--accent);color:var(--bg)}.pbtn-p:hover{box-shadow:0 0 24px rgba(155,201,242,.3)}
.pbtn-o{border:1.5px solid var(--border);color:var(--fg)}.pbtn-o:hover{border-color:var(--accent);color:var(--accent)}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 32px}
.auth-box h2{font-family:var(--display);font-size:28px;color:#fff;margin-bottom:8px;font-weight:800;text-align:center}
.auth-box .sub{color:var(--fg2);font-size:14px;margin-bottom:28px;text-align:center}
.auth-box label{display:block;font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px}
.abtn{width:100%;padding:14px;background:var(--accent);color:var(--bg);font-weight:700;font-size:15px;border-radius:10px;margin-top:24px;transition:all .15s}
.abtn:hover{box-shadow:0 0 24px rgba(155,201,242,.3)}.abtn:disabled{opacity:.5;cursor:wait}
.aswitch{margin-top:20px;font-size:13px;color:var(--fg3);text-align:center}
.aswitch a{color:var(--accent);font-weight:600;cursor:pointer}
.aerr{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.15);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-top:16px}

/* APP */
.app-hdr{position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(13,13,13,.85);border-bottom:1px solid var(--border);padding:12px 16px}
.app-hdr-in{display:flex;align-items:center;justify-content:space-between;max-width:640px;margin:0 auto}
.app-logo{display:flex;align-items:center;gap:8px;font-family:var(--display);font-size:16px;font-weight:800;color:#fff}
.app-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--bg);font-weight:900}
.ubadge{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--fg3)}
.ubar{width:60px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.ufill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.ufill.warn{background:var(--gold)}.ufill.danger{background:var(--red)}
.anav button{padding:6px 12px;font-size:12px;font-weight:600;color:var(--fg3);border-radius:6px;transition:all .15s}
.anav button:hover,.anav button.on{color:var(--accent);background:var(--accent-dim)}

/* TOOL */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:14px}
.lbl{display:block;font-size:10.5px;font-weight:700;color:var(--fg3);margin-bottom:5px;text-transform:uppercase;letter-spacing:1.2px}
.pill{border-radius:9px;padding:9px 14px;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;white-space:nowrap;border:1.5px solid var(--border);background:rgba(255,255,255,.025);color:var(--fg3)}
.pill.on{background:var(--accent-dim);border-color:rgba(155,201,242,.35);color:var(--accent)}
.ev-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;font-family:var(--mono)}
.ev-pos{background:rgba(155,201,242,.12);color:#9BCAF2;border:1px solid rgba(155,201,242,.2)}
.ev-neg{background:rgba(255,80,80,.1);color:#ff5555;border:1px solid rgba(255,80,80,.15)}
.sbox{background:rgba(255,255,255,.025);border-radius:7px;padding:8px 10px;text-align:center}
.sbox .sl{font-size:9.5px;color:var(--fg3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.sbox .sv{font-size:14px;font-weight:700;color:#fff;font-family:var(--display)}
.stitle{font-family:var(--display);font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;margin-bottom:14px}
.fbtn{width:100%;background:linear-gradient(135deg,rgba(155,201,242,.1),rgba(242,214,179,.08));border:1.5px solid rgba(155,201,242,.25);border-radius:11px;padding:13px;color:var(--accent);font-size:13.5px;font-weight:700;font-family:var(--display);transition:all .15s}
.fbtn:hover{box-shadow:0 0 24px rgba(155,201,242,.15)}.fbtn:disabled{opacity:.5;cursor:not-allowed}
.ib{border-radius:9px;padding:10px 14px;font-size:12px;line-height:1.6;margin-bottom:14px}
.ib-g{background:rgba(155,201,242,.04);border:1px solid rgba(155,201,242,.12);color:#7abeaa}
.ib-y{background:rgba(255,200,60,.06);border:1px solid rgba(255,200,60,.15);color:#f5c842}
.ib-r{background:rgba(255,60,60,.06);border:1px solid rgba(255,60,60,.15);color:#ff6b6b}
.mblk{background:rgba(0,0,0,.25);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.04);margin-top:8px}
.mtog{width:100%;text-align:left;cursor:pointer;background:none;border:none;padding:10px 14px;color:var(--fg3);display:flex;justify-content:space-between;align-items:center}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:all .15s;margin-bottom:6px}
.gcard.on{border-color:rgba(155,201,242,.2)}
.gbtn{width:100%;text-align:left;font-family:inherit;cursor:pointer;background:none;border:none;padding:12px 14px;color:var(--fg)}
.sgr{margin-bottom:12px}
.sgr-t{font-size:11px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;padding:0 4px;display:flex;align-items:center;gap:8px;cursor:pointer}
.sgr-t:hover{color:var(--fg2)}
.swrap{display:flex;flex-wrap:wrap;gap:5px}
.uprompt{background:linear-gradient(135deg,rgba(155,201,242,.06),rgba(242,214,179,.04));border:1px solid rgba(155,201,242,.15);border-radius:14px;padding:24px;text-align:center;margin:20px 0}
.uprompt h3{font-family:var(--display);color:#fff;font-size:18px;margin-bottom:8px;font-weight:700}
.uprompt p{color:var(--fg2);font-size:13px;margin-bottom:16px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:16px}
.scard h3{font-family:var(--display);font-size:18px;color:#fff;margin-bottom:4px;font-weight:700}
.scard .desc{font-size:13px;color:var(--fg2);margin-bottom:20px}
.ubar-lg{width:100%;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin:16px 0 8px}
.ubar-lg .fill{height:100%;border-radius:5px;transition:width .4s}
.unums{display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono);color:var(--fg3)}
.pbadge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.pb-free{background:rgba(255,255,255,.05);color:var(--fg3)}
.pb-standard{background:rgba(155,201,242,.1);color:var(--accent)}
.pb-unlimited{background:rgba(242,214,179,.1);color:var(--accent2)}
.pb-lifetime{background:rgba(255,195,18,.1);color:var(--gold)}
.mbtn{padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;border:1.5px solid var(--border);transition:all .15s}
.mbtn:hover{border-color:var(--accent);color:var(--accent)}
.lobtn{padding:12px 24px;border-radius:10px;font-weight:600;font-size:13px;color:var(--red);border:1.5px solid rgba(255,71,87,.2);transition:all .15s}
.lobtn:hover{background:rgba(255,71,87,.08)}
.footer{padding:40px 0;text-align:center;border-top:1px solid var(--border);margin-top:60px}
.footer p{font-size:12px;color:var(--fg3);line-height:1.8}
#root{min-height:100vh}
@media(max-width:768px){.hsteps{grid-template-columns:1fr}.pgrid{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}.hero h1{font-size:36px;letter-spacing:-1px}.nav-links .nbtn-g{display:none}}
</style>
</head>
<body>
<div class="noise"></div>
<div id="root"></div>
<script src="js/engine.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
